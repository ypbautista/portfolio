home:
  title: "Learning by Doing"
  body: "Hi, I'm Ynna Pauline. I'm currently an apprentice in application development, and this is my creative space to practice my skills and showcase my work."
  notice: "Curious? Take a look around!"

  link:
    text: "See more"
    url: "https://example.com"

  image:
    src: "images/snow.jpg"
    alt: "This is a black swan"
    caption: "Error 404: Summer not found."

  columns:
    - title: "Build"
      body: "Where ideas get turned into code and “it works on my machine” becomes “it works everywhere (hopefully).” I build projects, break things, fix them, and repeat."

    - title: "Learn"
      body: "Collecting programming languages like Pokémon and pretending I’ll master them all someday."

    - title: "Explore"
      body: "Because “I wonder what this button does” is a valid engineering strategy."

  show_contact_form: true

about:
  title: "About Me"
  body: "Currently working as an Application Developer apprentice, where I learn something new every day, sometimes by design and sometimes by debugging. This experience allows me to continuously improve my technical skills and gain confidence in building reliable applications."

  image:
    src: "images/dog.jpg"
    alt: "This is a dog"
    caption: "Meet my assistant. He specializes in paws-on debugging."

  show_contact_form: false
  aside:
    title: "Fun Fact"
    body: "In the 1800s, Ada Lovelace became the first computer programmer, making her one of the earliest women to shape modern technology."

  sections:
    - body: "Currently working as an Application Developer apprentice, where I learn something new every day, sometimes by design and sometimes by debugging. This experience allows me to continuously improve my technical skills and gain confidence in building reliable applications."

    - heading: "What I'm Learning 🧠"
    - list:
        - "Building full-stack understanding (front-end and back-end)"
        - "Writing clean, maintainable code"
        - "Understanding how web applications work from the ground up"
        - "Improving my debugging skills"

    - heading: "Goals"
    - list:
        - "Improve my understanding of system architecture"
        - "Learn more about databases and data management"


projects:
  title: "Projects 💻"
  body: "Here are some of the projects I've worked on."

  sections:
    - heading: "Procrastination Tracker"
    - body: "A productivity tool that starts when you say 'I'm going to be productive now' and immediately begins documenting your downfall. It tracks your work, quick breaks, and those accidental 47-minute side quests that were definitely not part of the plan. At the end, it gives a brutally honest summary like: 'Focus time: 12 minutes. Side quest completion rate: legendary.' Built to explore timing logic, user interaction, and the art of getting nothing done while feeling very busy."
    - links:
        - label: "Try it out"

    - heading: "RPS ✊✋✌"
    - body: "A browser-based Rock Paper Scissors game where users can play against the computer. The application handles user input, generates random choices, and displays results instantly with a simple and responsive interface."

